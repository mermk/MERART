<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERART STUDIO V7.9.0 - نسخة الهيبة والتحكم</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-green: #2ecc71; --dark-bg: #050505; --card-bg: #111; --text: #e0e0e0; }
        body { background: var(--dark-bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        #vault-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
        #vault-ring { width: 450px; height: 450px; border: 4px dashed rgba(46, 204, 113, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; transition: 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); box-shadow: 0 0 30px rgba(46, 204, 113, 0.1); }
        #access-box { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(0); text-align: center; background: rgba(0,0,0,0.9); padding: 30px; border-radius: 15px; border: 2px solid #2ecc71; box-shadow: 0 0 20px rgba(46, 204, 113, 0.3); z-index: 100; opacity: 0; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        #vault-status { color: #2ecc71; font-size: 11px; letter-spacing: 2px; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; text-shadow: 0 0 10px #2ecc71; }
        #access-key { width: 140px; background: transparent; border: none; border-bottom: 3px solid #2ecc71; color: #2ecc71; text-align: center; font-size: 28px; letter-spacing: 8px; outline: none; text-shadow: 0 0 15px #2ecc71; }
        
        @keyframes gearSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes neonPulse { 0%, 100% { box-shadow: 0 0 20px rgba(46, 204, 113, 0.3); border-color: rgba(46, 204, 113, 0.5); } 50% { box-shadow: 0 0 40px rgba(46, 204, 113, 0.6); border-color: #2ecc71; } }
        .access-active #vault-ring { animation: gearSpin 15s linear infinite, neonPulse 2s infinite; }
        .access-active #access-box { transform: translate(-50%, -50%) scale(1) !important; opacity: 1 !important; }
        .unlocked #vault-ring { transform: scale(10) rotate(720deg) !important; opacity: 0 !important; filter: blur(20px); pointer-events: none; }

        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--primary-green); width: 100%; max-width: 900px; padding: 10px; position: relative; }
        .header h1 { color: var(--primary-green); letter-spacing: 10px; margin: 0; font-size: 2.2em; text-transform: uppercase; }
        .btn-cinema { position: absolute; left: 10px; top: 15px; padding: 8px 15px; background: transparent; border: 1px solid var(--primary-green); color: var(--primary-green); border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.3s; text-decoration: none; }
        .btn-cinema:hover { background: var(--primary-green); color: black; box-shadow: 0 0 15px var(--primary-green); }

        .container { width: 100%; max-width: 850px; display: none; opacity: 0; transition: 1s ease-in; } 
        .section-box { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid #222; margin-bottom: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        .section-title { color: var(--primary-green); font-weight: bold; margin-bottom: 20px; display: block; border-right: 5px solid var(--primary-green); padding-right: 15px; font-size: 1.1em; }
        .inputs-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        select, input, textarea { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: white; border-radius: 12px; font-size: 14px; outline: none; box-sizing: border-box; }
        select:focus, input:focus, textarea:focus { border-color: var(--primary-green); }
        .btn-gen { width: 100%; padding: 16px; background: var(--primary-green); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; color: black; margin-bottom: 15px; transition: 0.3s; }
        .viewer-studio { min-height: 120px; background: #000; border-radius: 15px; border: 1px dashed #333; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; position: relative; }
        .img-result { max-width: 100%; border-radius: 10px; display: none; box-shadow: 0 0 30px rgba(0,0,0,1); }
        .loader-ui { display: none; width: 100%; text-align: center; }
        .progress-cont { width: 100%; height: 8px; background: #1a1a1a; border-radius: 10px; margin: 15px 0; overflow: hidden; border: 1px solid #222; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary-green); box-shadow: 0 0 15px var(--primary-green); transition: 0.3s; }
        .status-txt { color: var(--primary-green); font-size: 14px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .percentage { color: white; font-size: 18px; font-family: monospace; }
        .action-btns { display: none; gap: 10px; margin-top: 15px; width: 100%; }
        .btn-action { flex: 1; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-action:hover { border-color: var(--primary-green); color: var(--primary-green); }
        .ref-box { border: 1px solid #2ecc7133; padding: 10px; border-radius: 10px; margin-bottom: 10px; background: #1a2e2122; }
        
        .lora-row { margin-bottom: 15px; display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; }
        .lora-label { color: #888; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div id="vault-overlay">
    <div id="vault-ring"></div> <div id="access-box"> <div id="vault-status">AWAITING MASTER ACCESS</div>
        <input type="password" id="access-key" placeholder="••••" maxlength="4" autofocus>
    </div>
</div>

<div class="header">
    <h1>MERART STUDIO V7.9.0</h1>
    <a href="video.html" target="_blank" class="btn-cinema">السينما 🎬</a>
</div>

<div class="container" id="main-studio">
    <div class="section-box">
        <span class="section-title">1. التوليد الاحترافي (LoRA & Visual Reference)</span>
        <div class="inputs-row" style="grid-template-columns: 1fr 1fr 1fr;">
            <select id="host-select" onchange="updateModels()">
                <option value="pollinations">Pollinations (Flux Pro & More)</option>
                <option value="huggingface">Hugging Face (The Giants Era)</option>
                <option value="prodia">Prodia (Civitai Legends)</option>
                <option value="nol">NOL (بوابة التحرر المنفصلة - RAW)</option>
                <option value="ghost">GHOST (Cloudflare - نيرونات)</option>
                <option value="pollinations_raw">6. Pollinations (NSFW / Unfiltered)</option>
                <option value="nol_ultra">7. NOL Ultra (Extreme RAW Bypass)</option>
            </select>
            <select id="m1"></select>
            <select id="s1">
                <option value="1024x1024">Square (1:1)</option>
                <option value="720x1280">Portrait (9:16)</option>
                <option value="1280x720">Landscape (16:9)</option>
            </select>
        </div>

        <div class="lora-row">
            <select id="lora-select">
                <option value="">-- اختيار الملامح والستايل (LoRA Vault) --</option>
                <option value="extreme-realism">واقعية سينمائية فائقة (Ultra Realism)</option>
                <option value="historical-dignity">وقار تاريخي / ملامح الأئمة (Historical Dignity)</option>
                <option value="oriental-spirit">روح الشرق / ملامح عربية (Oriental Spirit)</option>
                <option value="ancient-manuscript">ستايل المخطوطات القديمة (Manuscript Art)</option>
                <option value="glowing-aura">نورانية وهيبة (Divine Aura Style)</option>
            </select>
            <span class="lora-label">ACTIVE LoRA</span>
        </div>

        <div class="ref-box">
            <input type="text" id="ref1" placeholder="أدخل رابط صورة المرجع (لإجبار المحرك على تقليد الملامح)...">
        </div>
        <textarea id="p1" rows="2" placeholder="أدخل وصف الصورة..."></textarea>
        <button class="btn-gen" onclick="fire('text')">استدعاء قوة المحرك ✨</button>
        <div class="viewer-studio">
            <div class="loader-ui" id="load1">
                <div class="status-txt" id="status1">Processing Deep Details...</div>
                <div class="percentage" id="perc1">0%</div>
                <div class="progress-cont"><div class="progress-fill" id="pb1"></div></div>
            </div>
            <img class="img-result" id="img1">
            <div class="action-btns" id="act1">
                <button class="btn-action" onclick="dl(1)">تنزيل 💾</button>
                <button class="btn-action" onclick="save(1)">حفظ سحابي 🦉</button>
            </div>
        </div>
    </div>

    <div class="section-box">
        <span class="section-title">2. التعديل القائم على صورة (Image to Image)</span>
        <div class="inputs-row">
            <input type="text" id="u2" placeholder="رابط الصورة المصدر (Direct URL)...">
            <select id="m2">
                <option value="flux">Flux Base</option>
                <option value="flux-pro">Flux.1 [pro] Precision</option>
            </select>
        </div>
        <textarea id="p2" rows="2" placeholder="أدخل التعديلات المطلوبة..."></textarea>
        <button class="btn-gen" style="background:#27ae60" onclick="fire('i2i')">معالجة الصورة 🖼️</button>
        <div class="viewer-studio">
            <div class="loader-ui" id="load2">
                <div class="status-txt">Analyzing Source...</div>
                <div class="percentage" id="perc2">0%</div>
                <div class="progress-cont"><div class="progress-fill" id="pb2"></div></div>
            </div>
            <img class="img-result" id="img2">
            <div class="action-btns" id="act2">
                <button class="btn-action" onclick="dl(2)">تنزيل 💾</button>
                <button class="btn-action" onclick="save(2)">حفظ سحابي 🦉</button>
            </div>
        </div>
    </div>
</div>

<script>
    const MASTER_KEY = "1111"; 
    window.addEventListener('DOMContentLoaded', () => {
        const overlay = document.getElementById('vault-overlay');
        const accessKeyInput = document.getElementById('access-key');
        setTimeout(() => { overlay.classList.add('access-active'); }, 500); 
        accessKeyInput.addEventListener('input', function(e) {
            if(this.value.length === 4) { validateVault(this.value); }
        });
    });

    function validateVault(val) {
        const ring = document.getElementById('vault-ring');
        const overlay = document.getElementById('vault-overlay');
        const status = document.getElementById('vault-status');
        const studio = document.getElementById('main-studio');
        if(val === MASTER_KEY) {
            status.innerText = "ACCESS GRANTED...";
            ring.style.animation = "gearSpin 0.5s linear infinite";
            setTimeout(() => {
                overlay.classList.add('unlocked');
                overlay.style.backgroundColor = "transparent";
                setTimeout(() => {
                    overlay.style.display = 'none';
                    studio.style.display = 'block';
                    setTimeout(() => { studio.style.opacity = '1'; }, 50);
                }, 800);
            }, 600);
        } else {
            overlay.classList.add('wrong-key');
            setTimeout(() => { overlay.classList.remove('wrong-key'); document.getElementById('access-key').value = ''; }, 1200);
        }
    }

    const SB_URL = 'https://ctvmxkwzzqwskgtgcuwc.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm14a3d6enF3c2tndGdjdXdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjE1MDksImV4cCI6MjA5MTczNzUwOX0.UrdE2w4gg-P9Hfy1b4uB34FES-CwQy0fs4LEF-TnagI';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);
    
    const qualityBoost = ", masterpiece, ultra-detailed 8k, photorealistic, cinematic lighting, sharp focus, intricate textures, divine atmosphere";
    
    const MERART_ASSETS = {
        "najaf": "https://media.alalam.ir/uploads/855x495/2020/10/16/160287561030293200.jpg",
        "karbala": "https://alkafeel.net/news/images/main/5d47d8919810bbab92c40fe636a32ec1.JPG",
        "imam": "https://pbs.twimg.com/profile_images/2013356643971395584/wh7Ip0Xf.jpg"
    };

    let storedUrls = {};

    const hostData = {
        pollinations: [
            {v: "flux-pro", n: "Flux.1 [pro] (الرتبة العليا)"},
            {v: "flux", n: "Flux Professional (Base)"},
            {v: "flux-realism", n: "Flux Realism (Extreme Skin)"},
            {v: "pablita", n: "Pablita Art Style"}
        ],
        huggingface: [
            {v: "black-forest-labs/FLUX.1-dev", n: "Flux Dev (التحكم المطلق)"},
            {v: "SG161222/RealVisXL_V4.0", n: "RealVisXL (الواقعية القصوى)"}
        ],
        nol: [ {v: "flux", n: "Flux RAW"} ],
        ghost: [ {v: "@cf/leonardo/phoenix-1.0", n: "GHOST: Leonardo"} ],
        pollinations_raw: [ {v: "flux-realism", n: "RAW: Flux Realism"} ],
        nol_ultra: [ {v: "flux", n: "ULTRA: RAW Bypass"} ]
    };

    function updateModels() {
        const host = document.getElementById('host-select').value;
        const modelSelect = document.getElementById('m1');
        modelSelect.innerHTML = '';
        hostData[host].forEach(m => {
            let opt = document.createElement('option');
            opt.value = m.v; opt.innerText = m.n;
            modelSelect.appendChild(opt);
        });
    }

    function injectReference(prompt) {
        let p = prompt.toLowerCase();
        let ref = "";
        if (p.includes("najaf") || p.includes("علي")) { ref += MERART_ASSETS["najaf"] + " , "; }
        if (p.includes("karbala") || p.includes("حسين")) { ref += MERART_ASSETS["karbala"] + " , "; }
        return { final: ref + prompt };
    }

    updateModels();

    async function fire(type) {
        let id = (type==='text')?1:2;
        const loader = document.getElementById(`load${id}`);
        const progressBar = document.getElementById(`pb${id}`);
        const percTxt = document.getElementById(`perc${id}`);
        const img = document.getElementById(`img${id}`);
        const actions = document.getElementById(`act${id}`);
        
        img.style.display = 'none'; actions.style.display = 'none';
        loader.style.display = 'block';
        
        let host = document.getElementById('host-select').value;
        let model = (id===1)?document.getElementById('m1').value:document.getElementById('m2').value;
        let size = (id===1)?document.getElementById('s1').value:"1024x1024";
        let [w, h] = size.split('x');
        let rawPrompt = (id===1)?document.getElementById('p1').value:document.getElementById('p2').value;
        
        let loraValue = document.getElementById('lora-select').value;
        let loraText = loraValue ? `implemented with LoRA style ${loraValue} for specific facial features, ` : "";

        let refUrl = (id===1) ? document.getElementById('ref1').value.trim() : "";
        let injection = (id===1) ? injectReference(rawPrompt) : { final: rawPrompt };
        let smartPrompt = loraText + injection.final;

        let progress = 0;
        let interval = setInterval(() => {
            if (progress < 95) {
                progress += Math.floor(Math.random() * 5) + 1;
                progressBar.style.width = progress + '%';
                percTxt.innerText = progress + '%';
            }
        }, 300);

        try {
            let finalUrl = "";
            const seed = Math.floor(Math.random()*99999999);
            const base = `https://image.pollinations.ai/prompt/`;
            const params = `?width=${w}&height=${h}&seed=${seed}&model=${model}&nologo=true`;
            
            // بروتوكول الحقن البصري (IP-Adapter Logic)
            if(refUrl !== "") {
                finalUrl = `${base}${encodeURIComponent(smartPrompt + qualityBoost)}${params}&refer=${encodeURIComponent(refUrl)}&enhance=true`;
            } else {
                finalUrl = `${base}${encodeURIComponent(smartPrompt + qualityBoost)}${params}`;
            }

            if (host.includes('raw') || host.includes('ultra')) finalUrl += "&safe=false";

            await new Promise((resolve, reject) => {
                const temp = new Image();
                temp.crossOrigin = "anonymous";
                temp.src = finalUrl;
                temp.onload = resolve;
                temp.onerror = reject;
            });

            clearInterval(interval);
            progressBar.style.width = '100%';
            percTxt.innerText = '100%';
            loader.style.display = 'none';
            img.src = finalUrl;
            img.style.display = 'block';
            actions.style.display = 'flex';
            storedUrls[id] = { url: finalUrl, prompt: smartPrompt, model: host + ":" + model };
        } catch (err) { clearInterval(interval); alert("فشل المحرك!"); loader.style.display = 'none'; }
    }

    async function dl(id) {
        const imageUrl = storedUrls[id].url;
        window.open(imageUrl, '_blank');
    }

    async function save(id) {
        const data = storedUrls[id];
        try {
            await _supabase.from('merart_logs').insert([{ prompt: data.prompt, output_url: data.url, content_type: 'Image', model_used: data.model }]);
            alert("تم الحفظ بنجاح! ✅");
        } catch (err) { alert("فشل الحفظ في سوبابيس!"); }
    }
</script>
</body>
</html>
