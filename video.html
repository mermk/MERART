<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERART STUDIO - محرك الفيديو السينمائي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary-purple: #8e44ad; 
            --dark-bg: #050505; 
            --card-bg: #111; 
            --text: #e0e0e0; 
        }
        
        body { 
            background: var(--dark-bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        .back-nav {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .btn-back {
            background: rgba(142, 68, 173, 0.1);
            border: 1px solid var(--primary-purple);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
        }

        .btn-back:hover {
            background: var(--primary-purple);
            box-shadow: 0 0 20px var(--primary-purple);
            transform: translateX(-5px);
        }

        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            border-bottom: 2px solid var(--primary-purple); 
            width: 100%; 
            max-width: 900px; 
            padding: 10px; 
        }
        .header h1 { 
            color: var(--primary-purple); 
            letter-spacing: 5px; 
            margin: 0; 
            font-size: 2em; 
            text-transform: uppercase; 
            text-shadow: 0 0 15px var(--primary-purple);
        }

        .container { 
            width: 100%; 
            max-width: 850px; 
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-box { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid #222; 
            margin-bottom: 40px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.7); 
            border-left: 5px solid var(--primary-purple);
        }

        .section-title { 
            color: var(--primary-purple); 
            font-weight: bold; 
            margin-bottom: 20px; 
            display: block; 
            padding-right: 15px; 
            font-size: 1.2em; 
            text-shadow: 0 0 10px rgba(142, 68, 173, 0.5);
        }

        .inputs-row { 
            display: grid; 
            grid-template-columns: 2fr 1fr; 
            gap: 15px; 
            margin-bottom: 15px; 
        }

        select, input, textarea { 
            width: 100%; 
            padding: 14px; 
            background: #000; 
            border: 1px solid #333; 
            color: white; 
            border-radius: 12px; 
            font-size: 14px; 
            outline: none; 
            box-sizing: border-box; 
            transition: 0.3s;
        }

        .btn-gen { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary-purple); 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            color: white; 
            margin-bottom: 15px; 
            transition: 0.3s; 
            text-transform: uppercase;
        }

        .btn-gen:hover:not(:disabled) { 
            filter: brightness(1.2); 
            box-shadow: 0 0 20px var(--primary-purple); 
        }

        .btn-gen:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .viewer-studio { 
            min-height: 250px; 
            background: #000; 
            border-radius: 15px; 
            border: 1px dashed #333; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            position: relative; 
            overflow: hidden;
        }

        video, img { 
            max-width: 100%; 
            max-height: 500px;
            border-radius: 10px; 
            display: none; 
            box-shadow: 0 0 30px rgba(0,0,0,1); 
            outline: none;
        }

        .loader-ui { 
            display: none; 
            width: 100%; 
            text-align: center; 
        }

        .progress-cont { 
            width: 80%; 
            height: 8px; 
            background: #1a1a1a; 
            border-radius: 10px; 
            margin: 15px auto; 
            overflow: hidden; 
            border: 1px solid #222; 
        }

        .progress-fill { 
            width: 0%; 
            height: 100%; 
            background: var(--primary-purple); 
            box-shadow: 0 0 15px var(--primary-purple); 
            transition: 0.3s; 
        }

        .status-txt { 
            color: var(--primary-purple); 
            font-size: 14px; 
            font-weight: bold; 
            margin-bottom: 5px; 
        }

        .action-btns { 
            display: none; 
            gap: 10px; 
            margin-top: 20px; 
            width: 100%; 
        }

        .btn-action { 
            flex: 1; 
            padding: 12px; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            color: white; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
        }

        .btn-action:hover { 
            border-color: var(--primary-purple); 
            color: var(--primary-purple); 
        }

        .direct-link {
            display: none;
            color: var(--primary-purple);
            margin-top: 10px;
            text-decoration: underline;
            cursor: pointer;
            font-size: 13px;
        }
    </style>
</head>
<body>

<nav class="back-nav">
    <a href="index.html" class="btn-back">
        <span>رجوع للملف الشخصي</span>
        <i>➜</i>
    </a>
</nav>

<div class="header">
    <h1>MERART VIDEO V1.3</h1>
</div>

<div class="container">
    <div class="section-box">
        <span class="section-title">محرك السينما الاحترافي (Deep Fetch Mode)</span>
        
        <div class="inputs-row">
            <input type="text" id="p4" placeholder="أدخل وصف المشهد السينمائي...">
            <select id="s4">
                <option value="video-576x320">Video Mode (Slow/High Quality)</option>
                <option value="turbo-512x512">Turbo Mode (Fast/Animation)</option>
            </select>
        </div>
        
        <button class="btn-gen" id="fireBtn" onclick="fireVideo()">إطلاق التصوير السينمائي 🎬</button>
        
        <div class="viewer-studio">
            <div class="loader-ui" id="load4">
                <div class="status-txt" id="status4">جاري تحضير المحرك...</div>
                <div class="percentage" id="perc4">0%</div>
                <div class="progress-cont">
                    <div class="progress-fill" id="pb4"></div>
                </div>
            </div>

            <video id="vid4" controls autoplay loop playsinline></video>
            <img id="img4" alt="Output">

            <div id="direct4" class="direct-link" onclick="openDirect()">المحرك يطول؟ اضغط لفتحه بتبويب منفصل 🔗</div>
            
            <div class="action-btns" id="act4">
                <button class="btn-action" onclick="dlVideo()">تنزيل 💾</button>
                <button class="btn-action" id="saveBtn" onclick="saveVideo()">حفظ بالخزنة 🦉</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://ctvmxkwzzqwskgtgcuwc.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm14a3d6enF3c2tndGdjdXdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjE1MDksImV4cCI6MjA5MTczNzUwOX0.UrdE2w4gg-P9Hfy1b4uB34FES-CwQy0fs4LEF-TnagI';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentVideoData = null;
    let globalUrl = "";

    async function fireVideo() {
        const loader = document.getElementById('load4');
        const pb = document.getElementById('pb4');
        const perc = document.getElementById('perc4');
        const btn = document.getElementById('fireBtn');
        const status = document.getElementById('status4');
        const prompt = document.getElementById('p4').value;
        const config = document.getElementById('s4').value.split('-');
        
        if(!prompt) return alert("اكتب الوصف يا بطل!");

        btn.disabled = true;
        loader.style.display = 'block';
        document.getElementById('vid4').style.display = 'none';
        document.getElementById('img4').style.display = 'none';
        document.getElementById('act4').style.display = 'none';
        document.getElementById('direct4').style.display = 'none';
        
        const seed = Math.floor(Math.random() * 999999);
        const mode = config[0];
        const [w, h] = config[1].split('x');
        globalUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=${w}&height=${h}&seed=${seed}&model=${mode === 'video' ? 'video' : 'turbo'}&nologo=true`;

        // تكتيك الـ Progress
        let p = 0;
        let iv = setInterval(() => {
            if(p < 90) {
                p += (p > 70 ? 0.2 : 1);
                pb.style.width = Math.floor(p) + '%';
                perc.innerText = Math.floor(p) + '%';
            }
        }, 1000);

        status.innerText = "جاري الاتصال بالسيرفر...";

        try {
            // Fetch للتأكد من الرابط شغال قبل تحميله بالمشغل
            const resp = await fetch(globalUrl);
            if(resp.ok) {
                status.innerText = "وصلت البيانات! جاري العرض...";
                finalize(mode, globalUrl, seed, iv);
            } else {
                throw new Error("Busy");
            }
        } catch (e) {
            clearInterval(iv);
            status.innerText = "المحرك مشغول.. جرب الرابط المباشر";
            document.getElementById('direct4').style.display = 'block';
            btn.disabled = false;
        }
    }

    function finalize(mode, url, seed, iv) {
        clearInterval(iv);
        document.getElementById('pb4').style.width = '100%';
        document.getElementById('perc4').innerText = '100%';
        
        const vid = document.getElementById('vid4');
        const img = document.getElementById('img4');

        if(mode === 'video') {
            vid.src = url;
            vid.style.display = 'block';
        } else {
            img.src = url;
            img.style.display = 'block';
        }

        setTimeout(() => {
            document.getElementById('load4').style.display = 'none';
            document.getElementById('act4').style.display = 'flex';
            document.getElementById('fireBtn').disabled = false;
            currentVideoData = { prompt: document.getElementById('p4').value, output_url: url, content_type: mode, seed_value: seed };
        }, 500);
    }

    function openDirect() { window.open(globalUrl, '_blank'); }

    async function dlVideo() { if(currentVideoData) window.open(currentVideoData.output_url, '_blank'); }

    async function saveVideo() {
        const sBtn = document.getElementById('saveBtn');
        sBtn.disabled = true;
        const { error } = await _supabase.from('merart_logs').insert([{ 
            prompt: currentVideoData.prompt, 
            output_url: currentVideoData.output_url, 
            content_type: currentVideoData.content_type, 
            model_used: 'DeepFetch_V1' 
        }]);
        if(!error) { alert("تم الحفظ! ✅"); sBtn.innerText = "تم الحفظ"; }
    }
</script>
</body>
</html>
