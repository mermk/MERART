<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERART STUDIO - المحرك السينمائي النهائي V5.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary-purple: #8e44ad; 
            --dark-bg: #050505; 
            --card-bg: #111; 
            --text: #e0e0e0; 
        }
        
        body { 
            background: var(--dark-bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden; 
        }

        .back-nav { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .btn-back {
            background: rgba(142, 68, 173, 0.1);
            border: 1px solid var(--primary-purple);
            color: white; padding: 10px 20px; border-radius: 50px;
            text-decoration: none; font-size: 14px; font-weight: bold;
            transition: 0.3s; display: flex; align-items: center; gap: 8px;
            backdrop-filter: blur(5px);
        }
        .btn-back:hover { background: var(--primary-purple); box-shadow: 0 0 20px var(--primary-purple); }

        .header { 
            text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--primary-purple); 
            width: 100%; max-width: 900px; padding: 10px; 
        }
        .header h1 { 
            color: var(--primary-purple); letter-spacing: 5px; margin: 0; 
            font-size: 1.8em; text-transform: uppercase; text-shadow: 0 0 15px var(--primary-purple);
        }

        .container { width: 100%; max-width: 850px; }

        .section-box { 
            background: var(--card-bg); padding: 25px; border-radius: 20px; 
            border: 1px solid #222; margin-bottom: 40px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.7); border-left: 5px solid var(--primary-purple);
        }

        .inputs-row { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 15px; }

        input, select { 
            width: 100%; padding: 14px; background: #000; border: 1px solid #333; 
            color: white; border-radius: 12px; font-size: 14px; outline: none;
        }

        .btn-gen { 
            width: 100%; padding: 16px; background: var(--primary-purple); border: none; 
            border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; 
            color: white; margin-bottom: 15px; transition: 0.3s;
        }
        .btn-gen:hover:not(:disabled) { box-shadow: 0 0 20px var(--primary-purple); }
        .btn-gen:disabled { background: #444; cursor: not-allowed; }

        .viewer-studio { 
            min-height: 350px; background: #000; border-radius: 15px; 
            border: 1px dashed #333; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 15px;
        }

        video { 
            max-width: 100%; max-height: 500px; border-radius: 10px; 
            display: none; box-shadow: 0 0 30px rgba(0,0,0,1); 
        }

        .loader-ui { display: none; width: 100%; text-align: center; }
        .progress-cont { width: 80%; height: 8px; background: #1a1a1a; border-radius: 10px; margin: 15px auto; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary-purple); transition: 0.3s; }
        .status-txt { color: var(--primary-purple); font-size: 14px; font-weight: bold; margin-bottom: 10px; }

        .action-btns { display: none; gap: 10px; margin-top: 20px; width: 100%; }
        .btn-action { 
            flex: 1; padding: 12px; background: #1a1a1a; border: 1px solid #333; 
            color: white; border-radius: 10px; cursor: pointer; font-weight: bold; 
        }
        .btn-action:hover { border-color: var(--primary-purple); color: var(--primary-purple); }
    </style>
</head>
<body>

<nav class="back-nav"><a href="index.html" class="btn-back"><span>العودة ➜</span></a></nav>

<div class="header"><h1>MERART VIDEO ENGINE V5</h1></div>

<div class="container">
    <div class="section-box">
        <div class="inputs-row">
            <input type="text" id="p4" placeholder="اكتب وصف الفيديو هنا (بالإنجليزي أفضل)...">
            <select id="engine4">
                <option value="stable">Stable Mirror</option>
                <option value="fast">Fast Video (Proxy)</option>
            </select>
        </div>
        
        <button class="btn-gen" id="fireBtn" onclick="fireUltimateEngine()">بدء التوليد السينمائي 🎬</button>
        
        <div class="viewer-studio">
            <div class="loader-ui" id="load4">
                <div class="status-txt" id="status4">جاري كسر حماية السيرفر وتوليد الفيديو...</div>
                <div id="perc4">0%</div>
                <div class="progress-cont"><div class="progress-fill" id="pb4"></div></div>
            </div>

            <video id="vid4" controls autoplay loop playsinline></video>
            
            <div class="action-btns" id="act4">
                <button class="btn-action" onclick="downloadMe()">تنزيل الفيديو 💾</button>
                <button class="btn-action" id="saveBtn" onclick="saveToVault()">حفظ في الخزنة 🦉</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://ctvmxkwzzqwskgtgcuwc.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm14a3d6enF3c2tndGdjdXdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjE1MDksImV4cCI6MjA5MTczNzUwOX0.UrdE2w4gg-P9Hfy1b4uB34FES-CwQy0fs4LEF-TnagI';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let finalAssetUrl = "";

    async function fireUltimateEngine() {
        const prompt = document.getElementById('p4').value;
        const btn = document.getElementById('fireBtn');
        const loader = document.getElementById('load4');
        const pb = document.getElementById('pb4');
        const vid = document.getElementById('vid4');
        const perc = document.getElementById('perc4');

        if(!prompt) return alert("يا محمديتي، الوصف مطلوب!");

        btn.disabled = true;
        loader.style.display = 'block';
        vid.style.display = 'none';
        document.getElementById('act4').style.display = 'none';

        // محاكاة تحميل
        let p = 0;
        let iv = setInterval(() => {
            if(p < 98) {
                p += (p > 85 ? 0.2 : 1.5);
                pb.style.width = Math.floor(p) + '%';
                perc.innerText = Math.floor(p) + '%';
            }
        }, 800);

        const seed = Math.floor(Math.random() * 999999);
        
        // استخدام رابط API مباشر يرجع الفيديو كملف خام (Blob) لتفادي الـ Redirect
        // المحرك: WAN-Fast المستقر حالياً
        const videoUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?model=video&seed=${seed}&nologo=true`;

        try {
            // تكنيك الـ Fetch القوي لمنع الـ Redirect لصفحة الـ Home
            const response = await fetch(videoUrl, { method: 'GET', mode: 'no-cors' });
            
            // في حال الـ no-cors، المتصفح سيعرض الفيديو مباشرة بالـ src
            vid.src = videoUrl;
            
            // ننتظر الفيديو يحمل فعلياً
            vid.oncanplaythrough = () => {
                clearInterval(iv);
                pb.style.width = '100%';
                perc.innerText = '100%';
                loader.style.display = 'none';
                vid.style.display = 'block';
                document.getElementById('act4').style.display = 'flex';
                btn.disabled = false;
                finalAssetUrl = videoUrl;
            };

            // لو تأخر السيرفر أكثر من 20 ثانية، نعطيه تنبيه
            setTimeout(() => {
                if(vid.style.display === 'none') {
                    clearInterval(iv);
                    alert("السيرفر ثقيل، راح أفتحه بتبويب منفصل غصباً عليه!");
                    window.open(videoUrl, '_blank');
                    btn.disabled = false;
                    loader.style.display = 'none';
                }
            }, 30000);

        } catch (e) {
            alert("فشل الاتصال بالبوابة الرئيسية");
            btn.disabled = false;
        }
    }

    function downloadMe() { window.open(finalAssetUrl, '_blank'); }

    async function saveToVault() {
        const sBtn = document.getElementById('saveBtn');
        sBtn.innerText = "...";
        const { error } = await _supabase.from('merart_logs').insert([{ 
            prompt: document.getElementById('p4').value, 
            output_url: finalAssetUrl, 
            content_type: 'Raw_Video' 
        }]);
        if(!error) { alert("تم الخزن! ✅"); sBtn.innerText = "محفوظ"; }
    }
</script>
</body>
</html>
