<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERART - الصور الاحترافية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-gold: #D4AF37; --dark-bg: #0a0a0a; --card-bg: #111; --text: #e0e0e0; }
        body { background: var(--dark-bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--primary-gold); width: 100%; max-width: 700px; padding: 10px; }
        .header h1 { color: var(--primary-gold); letter-spacing: 8px; margin: 0; font-size: 2.5em; text-shadow: 2px 2px 10px rgba(212, 175, 55, 0.3); }
        .container { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 100%; max-width: 600px; box-shadow: 0 0 40px rgba(0,0,0,1); border: 1px solid #222; }
        
        /* إضافة ستايل أزرار المقاسات */
        .size-selector { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .size-btn { flex: 1; padding: 10px; background: #1a1a1a; border: 1px solid #333; color: #888; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 14px; }
        .size-btn.active { border-color: var(--primary-gold); color: var(--primary-gold); background: #050505; box-shadow: 0 0 10px rgba(212, 175, 55, 0.1); }

        textarea { width: 100%; padding: 15px; background: #050505; border: 1px solid #333; color: white; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        textarea:focus { border-color: var(--primary-gold); outline: none; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
        
        .mode-title { text-align: center; color: var(--primary-gold); font-weight: bold; font-size: 1.2em; margin-bottom: 20px; letter-spacing: 2px; }

        .btn-main { width: 100%; padding: 18px; background: var(--primary-gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; color: black; transition: 0.3s; }
        .btn-main:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-main:disabled { background: #444; color: #888; cursor: not-allowed; }

        #result-box { margin-top: 25px; min-height: 450px; border: 1px solid #222; background: #050505; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 10px; overflow: hidden;}
        img { max-width: 100%; max-height: 80vh; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: block; opacity: 0; transition: opacity 0.5s ease-in; object-fit: contain; }
        img.loaded { opacity: 1; }
        
        .loader-wrapper { display: none; width: 80%; text-align: center; }
        .progress-container { width: 100%; height: 8px; background: #1a1a1a; border-radius: 10px; margin: 20px 0; overflow: hidden; position: relative; border: 1px solid #333; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #D4AF37 0%, #FFD700 100%); box-shadow: 0 0 15px var(--primary-gold); transition: width 0.4s ease; }
        .status-msg { color: var(--primary-gold); font-size: 16px; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 5px rgba(212,175,55,0.5); }
        .timer-text { color: #888; font-size: 13px; }

        .action-btns { display: none; gap: 12px; margin-top: 20px; width: 100%; }
        .btn-sec { flex: 1; padding: 14px; border: 1px solid #333; background: #1a1a1a; color: white; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 16px; }
        .btn-sec:hover { border-color: var(--primary-gold); color: var(--primary-gold); background: #050505; }
    </style>
</head>
<body>

<div class="header">
    <h1>MERART</h1>
</div>

<div class="container">
    <div class="mode-title">محرك الصور الاحترافية <br> (4K & Ultra Realism)</div>

    <div style="text-align: center; color: var(--primary-gold); margin-bottom: 10px; font-size: 0.9em; font-weight: bold;">أبعاد اللوحة:</div>
    <div class="size-selector">
        <button class="size-btn active" onclick="setSize(1024, 1024, this)">مربع (1:1)</button>
        <button class="size-btn" onclick="setSize(720, 1280, this)">طولي (كامل)</button>
        <button class="size-btn" onclick="setSize(1280, 720, this)">عرضي (سينمائي)</button>
    </div>

    <textarea id="promptInput" rows="4" placeholder="اوصف لوحتك هنا باللغة العربية أو الإنجليزية.."></textarea>
    
    <button class="btn-main" id="genBtn" onclick="generate()">استحضار الفن الاحترافي ✨</button>

    <div id="result-box">
        <div class="loader-wrapper" id="loaderWrapper">
            <div class="status-msg" id="statusText">جاري تحليل الأبعاد الفنية...</div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="timer-text" id="timer">الموقت: 0 ثانية</div>
        </div>
        <p id="placeholder" style="color: #444; text-align:center;">بانتظار لمستك الإبداعية يا "حمودي"...</p>
    </div>

    <div class="action-btns" id="actions">
        <button class="btn-sec" onclick="download()">تنزيل مباشر 💾</button>
        <button class="btn-sec" style="border-color: #D4AF37; color: #D4AF37;" onclick="saveToCloud()">حفظ في أرشيف MERART 🦉</button>
    </div>
</div>

<script>
    const SB_URL = 'https://ctvmxkwzzqwskgtgcuwc.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm14a3d6enF3c2tndGdjdXdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjE1MDksImV4cCI6MjA5MTczNzUwOX0.UrdE2w4gg-P9Hfy1b4uB34FES-CwQy0fs4LEF-TnagI';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let lastUrl = '';
    let timerInterval;
    let progressInterval;
    
    // متغيرات الأبعاد الجديدة
    let currentW = 1024;
    let currentH = 1024;

    function setSize(w, h, btn) {
        currentW = w;
        currentH = h;
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function resetUI() {
        const box = document.getElementById('result-box');
        const old = box.querySelector('img'); if(old) old.remove();
        document.getElementById('loaderWrapper').style.display = 'none';
        document.getElementById('placeholder').style.display = 'block';
        document.getElementById('actions').style.display = 'none';
        document.getElementById('genBtn').disabled = false;
        document.getElementById('genBtn').innerText = "استحضار الفن الاحترافي ✨";
        document.getElementById('progressBar').style.width = '0%';
        clearInterval(timerInterval);
        clearInterval(progressInterval);
    }

    async function generate() {
        const prompt = document.getElementById('promptInput').value;
        if (!prompt) return alert("اكتب وصفك يا بطل آل مير!");

        const loaderWrap = document.getElementById('loaderWrapper');
        const statusText = document.getElementById('statusText');
        const progressBar = document.getElementById('progressBar');
        const genBtn = document.getElementById('genBtn');
        const box = document.getElementById('result-box');
        
        const old = box.querySelector('img'); if(old) old.remove();
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('actions').style.display = 'none';
        loaderWrap.style.display = 'block';
        genBtn.disabled = true;
        genBtn.innerText = "يتم الاستحضار...";

        let seconds = 0;
        let progress = 0;
        const statusMessages = [
            "جاري تحليل الأبعاد الفنية...",
            "جاري رسم التفاصيل الدقيقة...",
            "جاري تطبيق الإضاءة السينمائية...",
            "جاري صقل العيون والملامح...",
            "شوية صبر، اللوحة بدت تكتمل...",
            "تقريباً خلصنا، انتظر السحر..."
        ];

        timerInterval = setInterval(() => {
            seconds++;
            document.getElementById('timer').innerText = `الموقت: ${seconds} ثانية`;
            if (seconds % 8 === 0) {
                const msgIndex = Math.floor(seconds / 8) % statusMessages.length;
                statusText.innerText = statusMessages[msgIndex];
            }
            if (seconds > 120) {
                resetUI();
                alert("السيرفر تأخر هواية!");
            }
        }, 1000);

        progressInterval = setInterval(() => {
            if (progress < 98) {
                progress += 1.5;
                progressBar.style.width = progress + '%';
            }
        }, 400);

        try {
            const seed = Math.floor(Math.random() * 999999);
            // رجعتلك بهاراتك المقدسة كاملة
            const enhanceKeywords = ", high resolution, photorealistic, extremely detailed eyes, sharp focus, dramatic atmosphere, cinematic lighting, masterpiece, 8k, ultra-realism";
            
            // الرابط هسة صار ياخذ الـ currentW والـ currentH اللي تختارهم
            lastUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + enhanceKeywords)}?width=${currentW}&height=${currentH}&seed=${seed}&nologo=true&model=flux&enhance=true`;
            
            const img = new Image();
            img.src = lastUrl;
            img.onload = () => {
                clearInterval(timerInterval);
                clearInterval(progressInterval);
                progressBar.style.width = '100%';
                setTimeout(() => {
                    loaderWrap.style.display = 'none';
                    img.classList.add('loaded');
                    box.appendChild(img);
                    document.getElementById('actions').style.display = 'flex';
                    genBtn.disabled = false;
                    genBtn.innerText = "استحضار الفن الاحترافي ✨";
                }, 600);
            };
            img.onerror = () => { throw new Error(); };
        } catch (e) {
            resetUI();
            alert("صارت مشكلة بالمحرك!");
        }
    }

    async function saveToCloud() {
        const prompt = document.getElementById('promptInput').value;
        const { error } = await _supabase
            .from('merart_logs')
            .insert([{ prompt: prompt, content_type: 'Image (Pro)', output_url: lastUrl }]);
        if (error) alert("مشكلة بالحفظ: " + error.message);
        else alert("تم الحفظ في مخزن MERART بنجاح! 🦉🎨");
    }

    function download() {
        const link = document.createElement('a');
        link.href = lastUrl; link.target = '_blank';
        link.download = `MERART_${Date.now()}.png`;
        document.body.appendChild(link); link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
