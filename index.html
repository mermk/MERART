<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERART STUDIO V7.5.0 - نسخة السيادة السحابية (Cloudflare Engine)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-green: #2ecc71; --dark-bg: #050505; --card-bg: #111; --text: #e0e0e0; }
        body { background: var(--dark-bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--primary-green); width: 100%; max-width: 900px; padding: 10px; }
        .header h1 { color: var(--primary-green); letter-spacing: 10px; margin: 0; font-size: 2.2em; text-transform: uppercase; }
        .container { width: 100%; max-width: 850px; }
        .section-box { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid #222; margin-bottom: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        .section-title { color: var(--primary-green); font-weight: bold; margin-bottom: 20px; display: block; border-right: 5px solid var(--primary-green); padding-right: 15px; font-size: 1.1em; }
        .inputs-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        select, input, textarea { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: white; border-radius: 12px; font-size: 14px; outline: none; box-sizing: border-box; }
        select:focus, input:focus, textarea:focus { border-color: var(--primary-green); }
        .btn-gen { width: 100%; padding: 16px; background: var(--primary-green); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; color: black; margin-bottom: 15px; transition: 0.3s; }
        .viewer-studio { min-height: 120px; background: #000; border-radius: 15px; border: 1px dashed #333; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; position: relative; }
        .img-result { max-width: 100%; border-radius: 10px; display: none; box-shadow: 0 0 30px rgba(0,0,0,1); }
        .loader-ui { display: none; width: 100%; text-align: center; }
        .progress-cont { width: 100%; height: 8px; background: #1a1a1a; border-radius: 10px; margin: 15px 0; overflow: hidden; border: 1px solid #222; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary-green); box-shadow: 0 0 15px var(--primary-green); transition: 0.3s; }
        .status-txt { color: var(--primary-green); font-size: 14px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .percentage { color: white; font-size: 18px; font-family: monospace; }
        .action-btns { display: none; gap: 10px; margin-top: 15px; width: 100%; }
        .btn-action { flex: 1; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .ref-box { border: 1px solid #2ecc7133; padding: 10px; border-radius: 10px; margin-bottom: 10px; background: #1a2e2122; }
    </style>
</head>
<body>

<div class="header"><h1>MERART STUDIO V7.5.0</h1></div>

<div class="container">
    <div class="section-box">
        <span class="section-title">1. التوليد المباشر (Cloudflare & Multi-Engine Control)</span>
        <div class="inputs-row" style="grid-template-columns: 1fr 1fr 1fr;">
            <select id="host-select" onchange="updateModels()">
                <option value="pollinations">Pollinations (Standard)</option>
                <option value="huggingface">Hugging Face (The Giants)</option>
                <option value="prodia">Prodia (Civitai)</option>
                <option value="nol">NOL (بوابة RAW)</option>
                <option value="ghost">GHOST (Cloudflare - سيرفرك الخاص)</option>
            </select>
            <select id="m1"></select>
            <select id="s1">
                <option value="1024x1024">Square (1:1)</option>
                <option value="720x1280">Portrait (9:16)</option>
                <option value="1280x720">Landscape (16:9)</option>
            </select>
        </div>
        <div class="ref-box">
            <input type="text" id="ref1" placeholder="أدخل رابط صورة الملامح (ControlNet)...">
        </div>
        <textarea id="p1" rows="2" placeholder="أدخل وصف الصورة... (عند اختيار GHOST يتم التوليد في سيرفرك الخاص)"></textarea>
        <button class="btn-gen" onclick="fire('text')">استدعاء قوة المحرك ✨</button>
        <div class="viewer-studio">
            <div class="loader-ui" id="load1">
                <div class="status-txt" id="status1">Cloudflare Engine Booting...</div>
                <div class="percentage" id="perc1">0%</div>
                <div class="progress-cont"><div class="progress-fill" id="pb1"></div></div>
            </div>
            <img class="img-result" id="img1">
            <div class="action-btns" id="act1">
                <button class="btn-action" onclick="dl(1)">تنزيل 💾</button>
                <button class="btn-action" onclick="save(1)">حفظ سحابي 🦉</button>
            </div>
        </div>
    </div>

    <div class="section-box">
        <span class="section-title">2. تحويل النمط الفني (Image to Art)</span>
        <input type="text" id="u3" placeholder="رابط الصورة المراد تحويلها..." style="margin-bottom:15px;">
        <select id="sty3" style="margin-bottom:15px;">
            <option value="Renaissance oil painting">لوحة زيتية كلاسيكية</option>
            <option value="charcoal sketch">رسم فحم احترافي</option>
            <option value="cyberpunk noir">سايبر بانك نيون</option>
        </select>
        <button class="btn-gen" style="background:#1e8449" onclick="fire('art')">تطبيق الفن 🎨</button>
        <div class="viewer-studio">
            <div class="loader-ui" id="load3">
                <div class="status-txt">Stylizing...</div>
                <div class="percentage" id="perc3">0%</div>
                <div class="progress-cont"><div class="progress-fill" id="pb3"></div></div>
            </div>
            <img class="img-result" id="img3">
            <div class="action-btns" id="act3">
                <button class="btn-action" onclick="dl(3)">تنزيل 💾</button>
                <button class="btn-action" onclick="save(3)">حفظ سحابي 🦉</button>
            </div>
        </div>
    </div>
</div>

<script>
    // الإعدادات المركزية
    const CLOUDFLARE_ENDPOINT = "https://x.nol-30c.workers.dev/";
    const SB_URL = 'https://ctvmxkwzzqwskgtgcuwc.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm14a3d6enF3c2tndGdjdXdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjE1MDksImV4cCI6MjA5MTczNzUwOX0.UrdE2w4gg-P9Hfy1b4uB34FES-CwQy0fs4LEF-TnagI';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    const hostData = {
        pollinations: [{v: "flux-pro", n: "Flux Pro"}, {v: "flux-realism", n: "Flux Realism"}],
        huggingface: [{v: "black-forest-labs/FLUX.1-dev", n: "Flux Dev"}],
        prodia: [{v: "realistic-vision-v6", n: "Realistic Vision"}],
        nol: [{v: "flux", n: "Flux RAW"}],
        ghost: [
            {v: "@cf/black-forest-labs/flux-1-schnell", n: "Flux 1.0 (أقصى تفاصيل)"},
            {v: "@cf/stabilityai/stable-diffusion-xl-base-1.0", n: "SDXL (الواقعية الخام)"},
            {v: "@cf/bytedance/stable-video-diffusion-img2vid-xt", n: "Video Engine (تجريبي)"}
        ]
    };

    let storedUrls = {};

    function updateModels() {
        const host = document.getElementById('host-select').value;
        const modelSelect = document.getElementById('m1');
        modelSelect.innerHTML = '';
        hostData[host].forEach(m => {
            let opt = document.createElement('option');
            opt.value = m.v; opt.innerText = m.n;
            modelSelect.appendChild(opt);
        });
    }
    updateModels();

    async function fire(type) {
        let id = (type==='text')?1:3;
        const loader = document.getElementById(`load${id}`);
        const progressBar = document.getElementById(`pb${id}`);
        const percTxt = document.getElementById(`perc${id}`);
        const img = document.getElementById(`img${id}`);
        const actions = document.getElementById(`act${id}`);
        
        img.style.display = 'none'; actions.style.display = 'none';
        loader.style.display = 'block';
        
        let host = document.getElementById('host-select').value;
        let model = document.getElementById('m1').value;
        let prompt = (id===1)?document.getElementById('p1').value:document.getElementById('sty3').value;

        let progress = 0;
        let interval = setInterval(() => {
            if (progress < 95) {
                progress += 3;
                progressBar.style.width = progress + '%';
                percTxt.innerText = progress + '%';
            }
        }, 200);

        if (host === 'ghost') {
            try {
                // استدعاء مباشر لسيرفر حمودي الخاص بدون أي فلاتر
                const response = await fetch(CLOUDFLARE_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt, model: model })
                });
                
                if (!response.ok) throw new Error("سيرفر Cloudflare غير مستقر حالياً");
                
                const blob = await response.blob();
                const objectURL = URL.createObjectURL(blob);
                
                clearInterval(interval);
                progressBar.style.width = '100%';
                percTxt.innerText = '100%';
                loader.style.display = 'none';
                img.src = objectURL;
                img.style.display = 'block';
                actions.style.display = 'flex';
                storedUrls[id] = { url: objectURL, prompt: prompt, model: model };
            } catch (err) {
                alert("خطأ في الاتصال بالسيرفر: " + err.message);
                loader.style.display = 'none';
                clearInterval(interval);
            }
        } else {
            // المحركات التقليدية
            const seed = Math.floor(Math.random()*999999);
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?model=${model}&seed=${seed}&nologo=true`;
            img.src = url;
            img.onload = () => {
                clearInterval(interval);
                loader.style.display = 'none';
                img.style.display = 'block';
                actions.style.display = 'flex';
                storedUrls[id] = { url: url, prompt: prompt, model: model };
            };
        }
    }

    function dl(id) {
        const a = document.createElement('a'); a.href = storedUrls[id].url;
        a.download = `MERART_GHOST_${Date.now()}.png`; a.click();
    }

    async function save(id) {
        const data = storedUrls[id];
        const { error } = await _supabase.from('merart_logs').insert([{ 
            prompt: data.prompt, output_url: data.url, model_used: data.model 
        }]);
        if(!error) alert("تم الحفظ في السحابة بنجاح! 🦉");
    }
</script>
</body>
</html>
