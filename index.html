<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERART STUDIO V7.6.1 - نسخة السيادة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-green: #2ecc71; --dark-bg: #050505; --card-bg: #111; --text: #e0e0e0; }
        body { background: var(--dark-bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* ستايلات البوابة النيونية (تعديل الثبات) */
        #vault-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
        
        /* الحلقة اللي تفتر */
        #vault-ring { width: 450px; height: 450px; border: 4px dashed rgba(46, 204, 113, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; transition: 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); box-shadow: 0 0 30px rgba(46, 204, 113, 0.1); }
        
        /* المستطيل الثابت - فصلناه عن دوران الحلقة */
        #access-box { 
            position: absolute; /* حتى لا يتأثر بدوران الأب */
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) scale(0); 
            text-align: center; background: rgba(0,0,0,0.9); padding: 30px; border-radius: 15px; border: 2px solid #2ecc71; box-shadow: 0 0 20px rgba(46, 204, 113, 0.3); z-index: 100; opacity: 0; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        #vault-status { color: #2ecc71; font-size: 11px; letter-spacing: 2px; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; text-shadow: 0 0 10px #2ecc71; }
        #access-key { width: 140px; background: transparent; border: none; border-bottom: 3px solid #2ecc71; color: #2ecc71; text-align: center; font-size: 28px; letter-spacing: 8px; outline: none; text-shadow: 0 0 15px #2ecc71; }
        
        @keyframes gearSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes neonPulse { 0%, 100% { box-shadow: 0 0 20px rgba(46, 204, 113, 0.3); border-color: rgba(46, 204, 113, 0.5); } 50% { box-shadow: 0 0 40px rgba(46, 204, 113, 0.6); border-color: #2ecc71; } }
        @keyframes neonErrorPulse { 0%, 100% { box-shadow: 0 0 20px rgba(231, 76, 60, 0.4); } 50% { box-shadow: 0 0 50px rgba(231, 76, 60, 0.8); } }
        @keyframes vaultShake { 0%, 100% { transform: translate(-50%, -50%) translateX(0); } 20% { transform: translate(-50%, -50%) translateX(-15px); } 40% { transform: translate(-50%, -50%) translateX(15px); } 60% { transform: translate(-50%, -50%) translateX(-10px); } 80% { transform: translate(-50%, -50%) translateX(10px); } }
        
        /* الحالة النشطة: الحلقة تفتر والمستطيل يثبت */
        .access-active #vault-ring { animation: gearSpin 15s linear infinite, neonPulse 2s infinite; }
        .access-active #access-box { transform: translate(-50%, -50%) scale(1) !important; opacity: 1 !important; }
        
        /* حالة الخطأ: اهتزاز المستطيل وتوهج أحمر */
        .wrong-key #access-box { animation: vaultShake 0.3s ease-in-out; border-color: #e74c3c !important; box-shadow: 0 0 20px rgba(231, 76, 60, 0.6) !important; }
        .wrong-key #vault-ring { border-color: #e74c3c !important; animation: gearSpin 2s linear infinite, neonErrorPulse 0.5s infinite !important; }

        .unlocked #vault-ring { transform: scale(10) rotate(720deg) !important; opacity: 0 !important; filter: blur(20px); pointer-events: none; }

        /* ستايلات الستوديو الأصلية */
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--primary-green); width: 100%; max-width: 900px; padding: 10px; }
        .header h1 { color: var(--primary-green); letter-spacing: 10px; margin: 0; font-size: 2.2em; text-transform: uppercase; }
        .container { width: 100%; max-width: 850px; display: none; opacity: 0; transition: 1s ease-in; } 
        .section-box { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid #222; margin-bottom: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        .section-title { color: var(--primary-green); font-weight: bold; margin-bottom: 20px; display: block; border-right: 5px solid var(--primary-green); padding-right: 15px; font-size: 1.1em; }
        .inputs-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        select, input, textarea { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: white; border-radius: 12px; font-size: 14px; outline: none; box-sizing: border-box; }
        select:focus, input:focus, textarea:focus { border-color: var(--primary-green); }
        .btn-gen { width: 100%; padding: 16px; background: var(--primary-green); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; color: black; margin-bottom: 15px; transition: 0.3s; }
        .viewer-studio { min-height: 120px; background: #000; border-radius: 15px; border: 1px dashed #333; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; position: relative; }
        .img-result { max-width: 100%; border-radius: 10px; display: none; box-shadow: 0 0 30px rgba(0,0,0,1); }
        .loader-ui { display: none; width: 100%; text-align: center; }
        .progress-cont { width: 100%; height: 8px; background: #1a1a1a; border-radius: 10px; margin: 15px 0; overflow: hidden; border: 1px solid #222; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary-green); box-shadow: 0 0 15px var(--primary-green); transition: 0.3s; }
        .status-txt { color: var(--primary-green); font-size: 14px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .percentage { color: white; font-size: 18px; font-family: monospace; }
        .action-btns { display: none; gap: 10px; margin-top: 15px; width: 100%; }
        .btn-action { flex: 1; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-action:hover { border-color: var(--primary-green); color: var(--primary-green); }
        .ref-box { border: 1px solid #2ecc7133; padding: 10px; border-radius: 10px; margin-bottom: 10px; background: #1a2e2122; }
    </style>
</head>
<body>

            </div>

    <div class="section-box">

            </div>
            <img class="img-result" id="img3">
            <div class="action-btns" id="act3">

</div>

<script>
    const MASTER_KEY = "1111"; 
    
    window.addEventListener('DOMContentLoaded', () => {
        const overlay = document.getElementById('vault-overlay');
        const accessKeyInput = document.getElementById('access-key');
        
        // البداية: البوابة تفتر فارغة
        setTimeout(() => { 
            overlay.classList.add('access-active'); 
        }, 500); 

        accessKeyInput.addEventListener('input', function(e) {
            if(this.value.length === 4) { validateVault(this.value); }
        });
    });

    function validateVault(val) {
        const ring = document.getElementById('vault-ring');
        const overlay = document.getElementById('vault-overlay');
        const status = document.getElementById('vault-status');
        const studio = document.getElementById('main-studio');

        if(val === MASTER_KEY) {
            status.innerText = "ACCESS GRANTED - LOGGING IN...";
            status.style.color = "#2ecc71";
            ring.style.animation = "gearSpin 0.5s linear infinite";
            
            setTimeout(() => {
                overlay.classList.add('unlocked');
                overlay.style.backgroundColor = "transparent";
                setTimeout(() => {
                    overlay.style.display = 'none';
                    studio.style.display = 'block';
                    setTimeout(() => { studio.style.opacity = '1'; }, 50);
                }, 800);
            }, 600);
        } else {
            status.innerText = "ACCESS DENIED - INVALID CODE";
            status.style.color = "#e74c3c";
            overlay.classList.add('wrong-key');
            
            setTimeout(() => {
                overlay.classList.remove('wrong-key');
                document.getElementById('access-key').value = '';
                status.innerText = "AWAITING MASTER ACCESS";
                status.style.color = "#2ecc71";
            }, 1200);
        }
    }

    // --- سكربت الستوديو الأصلي مالتك كامل ومحفوظ ---
    const CLOUDFLARE_ENDPOINT = "https://x.nol-30c.workers.dev/";
    const SB_URL = 'https://ctvmxkwzzqwskgtgcuwc.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm14a3d6enF3c2tndGdjdXdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjE1MDksImV4cCI6MjA5MTczNzUwOX0.UrdE2w4gg-P9Hfy1b4uB34FES-CwQy0fs4LEF-TnagI';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);
    
    const qualityBoost = ", highly detailed, 8k resolution, raw photo, f/1.4 lens, cinematic lighting, sharp focus, hyper-realistic skin texture, intricate details, masterpiece";
    const negPrompt = ", (deformed, distorted, disfigured:1.3), poorly drawn, bad anatomy, wrong anatomy, extra limb, missing limb, floating limbs, (mutated hands and fingers:1.4), disconnected limbs, mutation, mutated, ugly, disgusting, blurry, amputation, cartoon, anime, illustration, painting, drawing";
    
    const MERART_ASSETS = {
        "najaf": "https://media.alalam.ir/uploads/855x495/2020/10/16/160287561030293200.jpg , https://almerja.com/ph/img/mid/1773047136-2583.jpg",
        "karbala": "https://alkafeel.net/news/images/main/5d47d8919810bbab92c40fe636a32ec1.JPG , https://alkafeel.net/photos/imager/avif/06315e8f6b8dc428b1f8053d.jpg/NjUw",
        "imam": "https://img.wattpad.com/userbg/iooooi17.16430.jpg , https://pbs.twimg.com/profile_images/2013356643971395584/wh7Ip0Xf.jpg",
        "zulfiqar": "https://i0.wp.com/rajputanaarts.com/wp-content/uploads/2025/10/1000976504-scaled.jpg?fit=700%2C290&ssl=1 , https://mktraders.com.pk/wp-content/uploads/2025/02/mktraders-94.jpg"
    };

    let storedUrls = {};

    const hostData = {
        pollinations: [
            {v: "flux-pro", n: "Flux.1 [pro] (الرتبة العليا)"},
            {v: "flux", n: "Flux Professional (Base)"},
            {v: "flux-realism", n: "Flux Realism (Extreme Skin)"},
            {v: "pablita", n: "Pablita Art Style"},
            {v: "flux-anime", n: "Flux Anime Style"},
            {v: "any-dark", n: "Cinematic Dark"},
            {v: "turbo", n: "Turbo Speed"}
        ],
        huggingface: [
            {v: "black-forest-labs/FLUX.1-dev", n: "Flux Dev (التحكم المطلق)"},
            {v: "stablediffusionapi/juggernaut-xl-v9", n: "Juggernaut XL (ملك الواقعية)"},
            {v: "AlbedoBase/AlbedoBase-XL", n: "AlbedoBase (التوازن الفني)"},
            {v: "SG161222/RealVisXL_V4.0", n: "RealVisXL (الواقعية القصوى)"},
            {v: "dataautics/realistic-vision-v6.0", n: "Realistic Vision (الهوية الحقيقية)"},
            {v: "stabilityai/stable-diffusion-xl-base-1.0", n: "SDXL Base (التدقيق التاريخي)"},
            {v: "cagliostrolab/animagine-xl-3.1", n: "Illustrious / Animagine XL"},
            {v: "astraliteheart/pony-diffusion-v6-xl", n: "Pony Diffusion V6 XL"}
        ],
        prodia: [
            {v: "realistic-vision-v6", n: "Realistic Vision V6 (Civitai)"},
            {v: "dreamshaper-xl", n: "DreamShaper XL"},
            {v: "absolute-reality", n: "Absolute Reality"}
        ],
        nol: [
            {v: "flux", n: "Flux RAW (الخام المباشر)"},
            {v: "stablediffusionapi/epicrealism-xl", n: "Realism Engine V5 (Civitai)"},
            {v: "stablediffusionapi/juggernaut-aftermath", n: "Juggernaut Aftermath (Raw)"},
            {v: "astraliteheart/pony-diffusion-v6-xl", n: "Pony Realism v2 (Uncensored)"}
        ],
        ghost: [
            {v: "@cf/leonardo/phoenix-1.0", n: "GHOST: Leonardo Phoenix (نيرونات 🔥)"},
            {v: "@cf/leonardo/lucid-origin", n: "GHOST: Leonardo Lucid"},
            {v: "@cf/bytedance/stable-diffusion-xl-lightning", n: "GHOST: XL Lightning"},
            {v: "@cf/lykon/dreamshaper-8-lcm", n: "GHOST: DreamShaper 8"},
            {v: "@cf/stabilityai/stable-diffusion-xl-base-1.0", n: "GHOST: SDXL Pro"}
        ],
        pollinations_raw: [
            {v: "flux-realism", n: "RAW: Flux Skin Realism"},
            {v: "flux", n: "RAW: Flux Unfiltered"},
            {v: "any-dark", n: "RAW: Dark Cinematic"}
        ],
        nol_ultra: [
            {v: "flux", n: "ULTRA: Flux RAW Bypass"},
            {v: "astraliteheart/pony-diffusion-v6-xl", n: "ULTRA: Pony Realism Uncensored"}
        ]
    };

    function updateModels() {
        const host = document.getElementById('host-select').value;
        const modelSelect = document.getElementById('m1');
        modelSelect.innerHTML = '';
        hostData[host].forEach(m => {
            let opt = document.createElement('option');
            opt.value = m.v; opt.innerText = m.n;
            modelSelect.appendChild(opt);
        });
    }

    function injectReference(prompt) {
        let p = prompt.toLowerCase();
        let ref = "";
        let found = false;
        if (p.includes("najaf") || p.includes("نجف") || p.includes("ali") || p.includes("علي")) { ref += MERART_ASSETS["najaf"] + " , "; found = true; }
        if (p.includes("karbala") || p.includes("كربلاء") || p.includes("hussain") || p.includes("حسين") || p.includes("abbas") || p.includes("عباس")) { ref += MERART_ASSETS["karbala"] + " , "; found = true; }
        if (p.includes("imam") || p.includes("إمام")) { ref += MERART_ASSETS["imam"] + " , "; found = true; }
        if (p.includes("zulfiqar") || p.includes("ذو الفقار") || p.includes("sword") || p.includes("سيف")) { ref += MERART_ASSETS["zulfiqar"] + " , "; found = true; }
        return { final: ref + prompt, refs: ref, injected: found };
    }

    updateModels();

    async function fire(type) {
        let id = (type==='text')?1:(type==='i2i')?2:3;
        const loader = document.getElementById(`load${id}`);
        const progressBar = document.getElementById(`pb${id}`);
        const percTxt = document.getElementById(`perc${id}`);
        const img = document.getElementById(`img${id}`);
        const actions = document.getElementById(`act${id}`);
        const statusTxt = document.getElementById(`status${id}`);
        
        img.style.display = 'none'; actions.style.display = 'none';
        loader.style.display = 'block';
        
        let host = document.getElementById('host-select').value;
        let model = (id===1)?document.getElementById('m1').value:document.getElementById('m2').value;
        let size = (id===1)?document.getElementById('s1').value:"1024x1024";
        let [w, h] = size.split('x');
        let rawPrompt = (id===1)?document.getElementById('p1').value:(id===2)?document.getElementById('p2').value:document.getElementById('sty3').value;
        
        let refUrl = (id===1) ? document.getElementById('ref1').value.trim() : "";
        let injection = (id===1) ? injectReference(rawPrompt) : { final: rawPrompt, refs: "", injected: false };
        let smartPrompt = injection.final;

        if(refUrl !== "") {
            smartPrompt = `${refUrl} , strictly follow the facial features and structure of this reference image , ${smartPrompt}`;
        }

        const bypassCode = ", (unfiltered:1.6), raw anatomy, no censorship, high-res textures, full detail, hyper-realism, non-blurred, (explicit detail:1.2)";

        let progress = 0;
        let interval = setInterval(() => {
            if (progress < 96) {
                progress += Math.floor(Math.random() * 5) + 1;
                progressBar.style.width = progress + '%';
                percTxt.innerText = progress + '%';
            }
        }, 300);

        try {
            let finalUrl = "";
            const seed = Math.floor(Math.random()*99999999);

            if (host === 'pollinations_raw') {
                if(statusTxt) statusTxt.innerText = "Bypassing Gateway Filters...";
                finalUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(smartPrompt + bypassCode)}?width=${w}&height=${h}&seed=${seed}&model=${model}&nologo=true&enhance=false&safe=false&cache=false`;
            } 
            else if (host === 'nol_ultra') {
                if(statusTxt) statusTxt.innerText = "Executing ULTRA RAW Bypass...";
                finalUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(smartPrompt + ", perfectly rendered, no blur effects" + bypassCode)}?width=${w}&height=${h}&seed=${seed}&model=${model}&nologo=true&enhance=false&safe=false`;
            }
            else if (host === 'ghost') {
                const response = await fetch(CLOUDFLARE_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: smartPrompt + qualityBoost, model: model })
                });
                const imageBlob = await response.blob();
                finalUrl = URL.createObjectURL(imageBlob);
            }
            else {
                finalUrl = (host === 'nol') ? 
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(smartPrompt)}?width=${w}&height=${h}&seed=${seed}&model=flux&nologo=true&enhance=false` :
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(smartPrompt + qualityBoost)}?width=${w}&height=${h}&seed=${seed}&model=${model}&nologo=true`;
            }

            await new Promise((resolve, reject) => {
                const temp = new Image();
                temp.crossOrigin = "anonymous";
                temp.src = finalUrl;
                temp.onload = resolve;
                temp.onerror = reject;
            });

            clearInterval(interval);
            progressBar.style.width = '100%';
            percTxt.innerText = '100%';
            loader.style.display = 'none';
            img.src = finalUrl;
            img.style.display = 'block';
            actions.style.display = 'flex';
            storedUrls[id] = { url: finalUrl, prompt: smartPrompt, model: host + ":" + model };

        } catch (err) {
            clearInterval(interval);
            alert("فشل في المحرك: " + err.message);
            loader.style.display = 'none';
        }
    }

    async function save(id) {
        const data = storedUrls[id];
        try {
            const { error } = await _supabase.from('merart_logs').insert([{ 
                prompt: data.prompt, output_url: data.url, content_type: 'Image', model_used: data.model
            }]);
            if(error) throw error;
            alert("تم الحفظ بنجاح! ✅");
        } catch (err) { alert("فشل الحفظ!"); }
    }

    function dl(id) {
        const a = document.createElement('a'); a.href = storedUrls[id].url;
        a.download = `MERART_STUDIO_${Date.now()}.png`; a.click();
    }
</script>
</body>
</html>
