<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERART V4 - المنصة المستقلة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-gold: #D4AF37; --dark-bg: #050505; --card-bg: #111; --text: #e0e0e0; }
        body { background: var(--dark-bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--primary-gold); width: 100%; max-width: 900px; padding: 10px; }
        .header h1 { color: var(--primary-gold); letter-spacing: 10px; margin: 0; font-size: 2.5em; text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        
        .container { width: 100%; max-width: 850px; }
        .section-box { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid #222; margin-bottom: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        .section-title { color: var(--primary-gold); font-weight: bold; margin-bottom: 20px; display: block; border-right: 5px solid var(--primary-gold); padding-right: 15px; font-size: 1.2em; letter-spacing: 1px; }
        
        .inputs-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        select, input, textarea { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: white; border-radius: 12px; font-size: 14px; outline: none; box-sizing: border-box; transition: 0.3s; }
        select:focus, input:focus, textarea:focus { border-color: var(--primary-gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.1); }

        .btn-gen { width: 100%; padding: 16px; background: var(--primary-gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; color: black; margin-bottom: 15px; }
        
        /* استوديو العرض الخاص بكل سكشن */
        .viewer-studio { min-height: 100px; background: #000; border-radius: 15px; border: 1px dashed #333; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; position: relative; }
        .img-result { max-width: 100%; border-radius: 10px; display: none; box-shadow: 0 0 30px rgba(0,0,0,1); }
        
        /* لودر بروفيشنال */
        .loader-ui { display: none; width: 100%; text-align: center; }
        .progress-cont { width: 100%; height: 6px; background: #1a1a1a; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #D4AF37, #f1c40f); transition: 0.4s; }
        .status-txt { color: var(--primary-gold); font-size: 14px; font-weight: bold; margin-bottom: 5px; }

        .download-btn { display: none; margin-top: 15px; padding: 10px 25px; background: transparent; border: 1px solid var(--primary-gold); color: var(--primary-gold); border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header"><h1>MERART</h1></div>

<div class="container">
    <div class="section-box" id="sec-text">
        <span class="section-title">1. التوليد من النص (Text to Image)</span>
        <div class="inputs-row">
            <select id="m1">
                <option value="flux">Flux (الواقعي العالمي)</option>
                <option value="flux-pro">Kling/Chinese Deep (العملاق الصيني)</option>
                <option value="any-dark">Any Dark (غموض سينمائي)</option>
                <option value="turbo">Turbo (سرعة البرق)</option>
            </select>
            <select id="s1">
                <option value="1024x1024">مربع (1:1)</option>
                <option value="720x1280">طولي (كامل)</option>
                <option value="1280x720">عرضي (سينمائي)</option>
            </select>
        </div>
        <textarea id="p1" rows="2" placeholder="اوصف لوحتك هنا يا حمودي..."></textarea>
        <button class="btn-gen" onclick="fire('text')">استحضار النص ✨</button>
        
        <div class="viewer-studio" id="view1">
            <div class="loader-ui" id="load1">
                <div class="status-txt" id="st1">جاري تحليل الأبعاد...</div>
                <div class="progress-cont"><div class="progress-fill" id="pb1"></div></div>
            </div>
            <img class="img-result" id="img1">
            <button class="download-btn" id="dl1" onclick="dl(1)">تنزيل اللوحة 💾</button>
        </div>
    </div>

    <div class="section-box" id="sec-i2i">
        <span class="section-title">2. التوليد من صورة (Image to Image)</span>
        <input type="text" id="u2" placeholder="رابط الصورة المصدر (Direct Link)..." style="margin-bottom:15px;">
        <textarea id="p2" rows="2" placeholder="شنو التعديل اللي تريده؟"></textarea>
        <button class="btn-gen" style="background:#b89831" onclick="fire('i2i')">توليد من المصدر 🖼️</button>
        
        <div class="viewer-studio" id="view2">
            <div class="loader-ui" id="load2">
                <div class="status-txt" id="st2">جاري مطابقة الصورة...</div>
                <div class="progress-cont"><div class="progress-fill" id="pb2"></div></div>
            </div>
            <img class="img-result" id="img2">
            <button class="download-btn" id="dl2" onclick="dl(2)">تنزيل النتيجة 💾</button>
        </div>
    </div>

    <div class="section-box" id="sec-art">
        <span class="section-title">3. تحويل النمط (Image to Art)</span>
        <input type="text" id="u3" placeholder="رابط الصورة المراد تحويلها..." style="margin-bottom:15px;">
        <select id="sty3" style="margin-bottom:15px;">
            <option value="Renaissance oil painting, detailed brushstrokes">لوحة زيتية كلاسيكية</option>
            <option value="professional charcoal pencil sketch, high contrast">رسم فحم احترافي</option>
            <option value="cyberpunk 2077 aesthetic, neon glows">سايبر بانك (نيون)</option>
            <option value="traditional Chinese ink wash painting">رسم الحبر الصيني (Ink Wash)</option>
        </select>
        <button class="btn-gen" style="background:#8e7425" onclick="fire('art')">تحويل النمط 🎨</button>
        
        <div class="viewer-studio" id="view3">
            <div class="loader-ui" id="load3">
                <div class="status-txt" id="st3">جاري تطبيق الفن...</div>
                <div class="progress-cont"><div class="progress-fill" id="pb3"></div></div>
            </div>
            <img class="img-result" id="img3">
            <button class="download-btn" id="dl3" onclick="dl(3)">تنزيل الفن 💾</button>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://ctvmxkwzzqwskgtgcuwc.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0dm14a3d6enF3c2tndGdjdXdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjE1MDksImV4cCI6MjA5MTczNzUwOX0.UrdE2w4gg-P9Hfy1b4uB34FES-CwQy0fs4LEF-TnagI';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    const enhance = ", 8k, photorealistic, perfect anatomy, masterpiece, ultra-detailed";
    let urls = {};

    async function fire(type) {
        let id = (type==='text')?1:(type==='i2i')?2:3;
        const loader = document.getElementById(`load${id}`);
        const progressBar = document.getElementById(`pb${id}`);
        const statusTxt = document.getElementById(`st1`); // Simplified for logic
        const img = document.getElementById(`img${id}`);
        const dlBtn = document.getElementById(`dl${id}`);
        
        // Reset UI
        img.style.display = 'none'; dlBtn.style.display = 'none';
        loader.style.display = 'block'; progressBar.style.width = '0%';
        
        let finalPrompt = "";
        let model = (id===1)?document.getElementById('m1').value:"flux";
        let size = (id===1)?document.getElementById('s1').value:"1024x1024";
        let [w, h] = size.split('x');

        if(type==='text') finalPrompt = document.getElementById('p1').value + enhance;
        else if(type==='i2i') finalPrompt = `${document.getElementById('u2').value.trim()} , ${document.getElementById('p2').value} ${enhance}`;
        else if(type==='art') finalPrompt = `${document.getElementById('u3').value.trim()} converted into ${document.getElementById('sty3').value} ${enhance}`;

        // Fake Progress Animation
        let prog = 0;
        let pInterval = setInterval(()=> {
            if(prog < 90) { prog += 5; progressBar.style.width = prog + '%'; }
        }, 300);

        const seed = Math.floor(Math.random()*999999);
        const finalUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=${w}&height=${h}&seed=${seed}&model=${model}&nologo=true`;
        
        const tempImg = new Image();
        tempImg.src = finalUrl;
        tempImg.onload = () => {
            clearInterval(pInterval);
            progressBar.style.width = '100%';
            setTimeout(()=> {
                loader.style.display = 'none';
                img.src = finalUrl;
                img.style.display = 'block';
                dlBtn.style.display = 'block';
                urls[id] = finalUrl;
                save(finalPrompt, finalUrl);
            }, 500);
        };
    }

    async function save(p, u) { await _supabase.from('merart_logs').insert([{ prompt: p, output_url: u }]); }
    function dl(id) { const a = document.createElement('a'); a.href = urls[id]; a.download = `MERART_${id}_${Date.now()}.png`; a.click(); }
</script>
</body>
</html>
